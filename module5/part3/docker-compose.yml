version: '5.1.0'

services:
  # 1. Mongo database (must be first)
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db


  # 2. Backend banking API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - SECRET_KEY=supersecretkey
    depends_on:
      - mongo


  # 3. Transactions microservice
  transactions:
    build: ./transactions
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PORT=5001
    ports:
      - "5001:5001"
    depends_on:
      - mongo


  # 4. Frontend service (serves the UI)
  studentportfolio:
    build: ./studentportfolio
    ports:
      - "3000:80"
    depends_on:
      - backend


  # 5. Nginx reverse proxy (entry point for browser traffic)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - studentportfolio
      - transactions

volumes:
  mongo_data: